<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>MCI Ecoflow | Power Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&amp;display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #00d1ff; /* EcoFlow Blue */
            --danger: #ff3e3e; /* Aputure Red */
            --bg: #0a0b0c;
            --surface: #16181a;
            --input-bg: #1f2225;
            --text-primary: #ffffff;
            --text-secondary: #8e9196;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-primary);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .card {
            width: 100%;
            max-width: 740px;
            background: var(--surface);
            border-radius: 28px;
            padding: 32px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Identidade MCI */
        .brand {
            text-align: center;
            margin-bottom: 35px;
        }
        .brand h1 {
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin: 0;
        }
        .brand p {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 6px;
            font-weight: 400;
        }

        /* Campos de Entrada */
        .field-group {
            margin-bottom: 24px;
        }
        .label-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .label-header label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.05);
            color: #fff;
            padding: 16px;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            cursor: pointer;
            appearance: none;
        }

        /* Checkboxes Modernos */
        .options-row {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .check-btn {
            flex: 1;
            background: var(--input-bg);
            padding: 14px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .check-btn input { display: none; }
        .check-btn:has(input:checked) {
            background: rgba(0, 209, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Slider de Intensidade */
        .dimmer-box {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 18px;
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            margin: 15px 0;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        /* Botão de Ação */
        .calc-trigger {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .calc-trigger:hover { opacity: 0.9; transform: scale(0.99); }

        /* Visor de Resultados */
        .display-panel {
            margin-top: 35px;
            background: #000;
            border-radius: 24px;
            padding: 30px;
            display: none;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .time-value {
            font-size: 64px;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
            margin-bottom: 8px;
            display: block;
        }
        .time-unit {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-secondary);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #1a1a1a;
        }
        .data-point span {
            display: block;
            font-size: 9px;
            color: #555;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .data-point strong { font-size: 15px; color: #fff; font-weight: 600; }

        .alert-msg {
            margin-top: 20px;
            font-size: 11px;
            color: var(--danger);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <h1>MCI ECOFLOW</h1>
        <p>Inteligência em Energia para Audiovisual</p>
    </div>

    <div class="field-group">
        <div class="label-header"><label>Estação de Energia</label></div>
        <select id="eco">
            <option value="4096|4000|8000|4096">DELTA Pro 3</option>
            <option value="3600|3600|4500|3600">DELTA Pro</option>
            <option value="2048|2400|3100|2048">DELTA 2 Max</option>
            <option value="1024|1800|2200|1024">DELTA 2</option>
        </select>
        <div class="options-row">
            <label class="check-btn"><input type="checkbox" id="eb"> +1 BAT. EXTRA</label>
            <label class="check-btn"><input type="checkbox" id="xb"> X-BOOST</label>
        </div>
    </div>

    <div class="field-group">
        <div class="label-header"><label>Equipamento de Luz</label></div>
        <select id="light">
            <optgroup label="APUTURE STORM">
                <option value="5200">STORM XT52 (5.2kW)</option>
                <option value="1440">STORM 1200x</option>
                <option value="1200">STORM 1000c</option>
            </optgroup>
            <optgroup label="APUTURE LIGHT STORM">
                <option value="1440">LS 1200d Pro</option>
                <option value="720">LS 600d Pro</option>
                <option value="350">LS 300x II</option>
            </optgroup>
            <optgroup label="AMARAN">
                <option value="360">Amaran 300c</option>
                <option value="221">Amaran 200d S</option>
            </optgroup>
        </select>
    </div>

    <div class="field-group">
        <div class="dimmer-box">
            <div class="label-header">
                <label>Dimmer</label>
                <span id="dimVal" style="color:var(--accent); font-weight:800;">100%</span>
            </div>
            <input type="range" id="dim" min="1" max="100" value="100" oninput="document.getElementById('dimVal').innerText=this.value+'%'">
        </div>
    </div>

    <button class="calc-trigger" onclick="run()">Gerar estimativa</button>

    <div id="display" class="display-panel">
        <span class="time-unit">Autonomia Estimada</span>
        <span class="time-value" id="tRes">--</span>
        
        <div class="data-grid">
            <div class="data-point">
                <span>Consumo Real</span>
                <strong id="wRes">0 W</strong>
            </div>
            <div class="data-point">
                <span>Capacidade</span>
                <strong id="cRes">0 Wh</strong>
            </div>
        </div>
        <div id="msg" class="alert-msg"></div>
    </div>
</div>

<script>
    function run() {
        const eco = document.getElementById('eco').value.split('|');
        const cap = parseFloat(eco[0]);
        const limit = document.getElementById('xb').checked ? parseFloat(eco[2]) : parseFloat(eco[1]);
        const eb = parseFloat(eco[3]);

        const lightW = parseFloat(document.getElementById('light').value);
        const dim = document.getElementById('dim').value / 100;
        const load = lightW * dim;

        const totalCap = document.getElementById('eb').checked ? (cap + eb) : cap;

        const disp = document.getElementById('display');
        const msg = document.getElementById('msg');
        disp.style.display = 'block';
        msg.innerText = "";

        if (load > limit) {
            document.getElementById('tRes').innerText = "LIMIT";
            document.getElementById('tRes').style.color = "var(--danger)";
            msg.innerText = "OVERLOAD: CARGA EXCEDIDA PARA ESTE MODELO";
        } else {
            // Eficiência realística de 85% para AC
            const hours = (totalCap * 0.85) / load;
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);

            document.getElementById('tRes').innerText = `${h}h ${m}m`;
            document.getElementById('tRes').style.color = "var(--accent)";
            document.getElementById('wRes').innerText = `${Math.round(load)} W`;
            document.getElementById('cRes').innerText = `${totalCap} Wh`;
            
            if(load > 3500) msg.innerText = "SISTEMA OPERANDO EM ALTA POTÊNCIA";
            if(h === 0 && m < 30) document.getElementById('tRes').style.color = "#ff9800";
        }
    }
</script>
</body>
</html>
